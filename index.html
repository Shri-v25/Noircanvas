<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirCanvas | Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="noir">
    
    <div class="moonlight"></div>

    <nav class="glass-nav">
        <div class="logo">NoirCanvas.</div>
        <div class="nav-links">
            <a href="#">Portfolio</a>
            <a href="#">Lab</a>
            <a href="#">Journal</a>
        </div>
        <button id="theme-toggle" class="toggle-btn">
            <span class="toggle-icon">✦</span> Toggle Canvas
        </button>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1 class="cinematic-title">Ticket to the <br> <span>Unknown</span></h1>
            <p class="subtitle">A creative technologist's sanctuary. Next stop: Deployment.</p>
            
            <div class="action-bar glass-panel">
                <div class="action-item">
                    <span class="label">From</span>
                    <span class="value">Localhost</span>
                </div>
                <div class="action-item">
                    <span class="label">To</span>
                    <span class="value">Production</span>
                </div>
                <button class="primary-btn">Initialize</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
